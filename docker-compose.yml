services:
  mongo:
    image: mongo:7
    container_name: chem_app_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-chem_app}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
