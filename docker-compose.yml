services:
  mongo:
    image: mongo:7
    container_name: chem_app_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --eval
        "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }) }"
        --quiet
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
